services:
  - type: web
    name: dtpennyroute
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: STORAGE_PATH
        value: /opt/render/project/src/storage
      - key: GITHUB_REPO
        value: asandyant/dtpennyroute
      - key: GITHUB_BRANCH
        value: main
      - key: GITHUB_TOKEN
        sync: false   # Set this in the Render dashboard — never commit the token value.
                      # Create a fine-grained PAT at github.com/settings/tokens with
                      # "Contents: Read and Write" permission on this repo only.
